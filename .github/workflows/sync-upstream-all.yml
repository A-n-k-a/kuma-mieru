name: Sync upstream branches and tags

on:
  schedule:
    - cron: '0 20 * * *' # 北京时间4:00
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.UPSTREAM_SYNC_TOKEN }}

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          set -e

          git remote add upstream https://github.com/Alice39s/kuma-mieru.git

          echo "📥 Fetch origin..."
          git fetch origin --prune

          echo "📥 Fetch upstream branches and tags..."
          git fetch upstream --prune --tags

      - name: Sync all branches (skip conflicts, fail at end)
        run: |
          set +e  # 不在中途直接失败

          conflict_branches=()
          synced_branches=()

          for branch in $(git branch -r | grep '^  upstream/' | grep -v 'HEAD' | sed 's|  upstream/||'); do
            echo "🔄 Syncing branch: $branch"

            if git show-ref --verify --quiet refs/remotes/origin/$branch; then
              echo "✅ Branch exists on origin: $branch"
              git checkout -B "$branch" "origin/$branch"

              git merge "upstream/$branch" --no-edit
              if [ $? -ne 0 ]; then
                echo "❌ Merge conflict on branch: $branch"
                conflict_branches+=("$branch")

                git merge --abort || true
                git reset --hard
                continue
              fi
            else
              echo "🆕 Branch does not exist on origin, creating from upstream: $branch"
              git checkout -B "$branch" "upstream/$branch"
            fi

            echo "🚀 Pushing branch: $branch"
            git push origin "$branch"
            synced_branches+=("$branch")
          done

          echo "## 🔄 Upstream Sync Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ ${#synced_branches[@]} -ne 0 ]; then
            echo "### ✅ Successfully Synced Branches" >> "$GITHUB_STEP_SUMMARY"
            for b in "${synced_branches[@]}"; do
              echo "- \`$b\`" >> "$GITHUB_STEP_SUMMARY"
            done
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ ${#conflict_branches[@]} -ne 0 ]; then
            echo "### ❌ Branches With Merge Conflicts" >> "$GITHUB_STEP_SUMMARY"
            echo "_Manual intervention required_" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            for b in "${conflict_branches[@]}"; do
              echo "- 🚫 \`$b\`" >> "$GITHUB_STEP_SUMMARY"
            done

            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> ❗ Sync completed with merge conflicts. Job marked as **failed**." >> "$GITHUB_STEP_SUMMARY"

            exit 1
          else
            echo "🎉 All branches synced successfully without conflicts." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Sync tags
        if: always()
        run: |
          set -e
          echo "🏷️ Syncing tags..."
          git push origin --tags
